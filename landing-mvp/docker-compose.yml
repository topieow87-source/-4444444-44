version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: landing_mvp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/landing_mvp?schema=public"
      JWT_SECRET: "local-dev-secret-change-me-please-32chars"
      JWT_EXPIRES_IN: "7d"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
